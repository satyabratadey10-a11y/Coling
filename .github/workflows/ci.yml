name: Coling CI/CD Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      run: |
        sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Cache FFmpegKit AAR
      id: cache-ffmpeg
      uses: actions/cache@v4
      with:
        path: app/libs/ffmpeg-kit.aar
        key: ffmpeg-kit-arm64-v8a-v6.0

    - name: Compile FFmpegKitNext (if not cached)
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
      run: |
        # Skip if already committed in repository
        if [ -f app/libs/ffmpeg-kit.aar ]; then
          echo "FFmpeg Kit AAR already checked in. Skipping compilation."
          exit 0
        fi
        
        sudo apt-get update
        sudo apt-get install -y nasm yasm make cmake git autoconf libtool pkg-config
        
        # Clone ffmpeg-kit-next (main branch represents the continuation)
        git clone --depth 1 https://github.com/arthenica/ffmpeg-kit.git ffmpeg_kit_build
        cd ffmpeg_kit_build
        
        # Compile arm64-v8a only, targeting default 4KB page alignment
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        ./android.sh --disable-arm-v7a --disable-x86 --disable-x86-64 --enable-gpl
        
        # Move output AAR to target app/libs directory
        mkdir -p ../app/libs/
        find prebuilt -name "*.aar" -exec cp {} ../app/libs/ffmpeg-kit.aar \;
        cd ..

    - name: Commit and Push compiled FFmpeg AAR to Repository
      run: |
        if git status --porcelain | grep -q "app/libs/ffmpeg-kit.aar"; then
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/libs/ffmpeg-kit.aar
          git commit -m "Check in compiled FFmpeg AAR [skip ci]"
          git push origin HEAD:${{ github.ref }}
        else
          echo "No new FFmpeg AAR compiled, skipping commit."
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2

    - name: Build Debug & Release APK
      run: gradle assembleDebug assembleRelease --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: coling-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: coling-release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk
